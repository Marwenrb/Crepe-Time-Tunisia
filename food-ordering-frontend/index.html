    <!-- ─── Inline critical CSS — prevents layout shift before JS hydrates ── -->
    <style>
      /* ═══════════════════════════════════════════════════════
         CINEMATIC REVEAL LOADER — Crêpe Time Tunisia
         Magazine-cover editorial: logo halo → gold line → name
         No card, no orbits, no progress bar. Pure luxury.
         ═══════════════════════════════════════════════════════ */
      #ct-preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        background: #07040D;
        overflow: hidden;
        transition: opacity 0.52s cubic-bezier(0.4,0,0.2,1), visibility 0.52s ease;
      }
      /* violet nebula — top right */
      #ct-preloader::before {
        content: '';
        position: absolute;
        top: -18%; right: -12%;
        width: 62vmin; height: 62vmin;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(76,29,149,0.18) 0%, transparent 68%);
        pointer-events: none;
      }
      /* gold nebula — bottom left */
      #ct-preloader::after {
        content: '';
        position: absolute;
        bottom: -14%; left: -8%;
        width: 52vmin; height: 52vmin;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(212,175,55,0.085) 0%, transparent 68%);
        pointer-events: none;
      }
      #ct-preloader.ct-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      /* ── scene wrapper ─────────────────────────────────────── */
      .ct-loader-scene {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 0 24px;
      }
      /* ── logo halo circle ──────────────────────────────────── */
      .ct-loader-logo {
        width: 108px;
        height: 108px;
        border-radius: 50%;
        background: linear-gradient(160deg, #FFFFFF 0%, #F5F0E8 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow:
          0 0 0 1px   rgba(212,175,55,0.24),
          0 0  52px   rgba(212,175,55,0.14),
          0 0 100px   rgba(76,29,149,0.10),
          0 24px 64px rgba(0,0,0,0.58);
        animation: ct-logo-in 720ms cubic-bezier(0.34,1.56,0.64,1) 80ms both;
      }
      .ct-loader-logo-img {
        width: 78px;
        height: 78px;
        object-fit: contain;
      }
      /* ── gold divider ──────────────────────────────────────── */
      .ct-loader-line {
        width: 70px;
        height: 1px;
        margin: 28px auto 22px;
        background: linear-gradient(90deg,
          transparent 0%,
          rgba(212,175,55,0.72) 40%,
          rgba(229,199,107,0.90) 50%,
          rgba(212,175,55,0.72) 60%,
          transparent 100%
        );
        transform-origin: center;
        animation: ct-line-grow 900ms cubic-bezier(0.22,1,0.36,1) 620ms both;
      }
      /* ── brand name ────────────────────────────────────────── */
      .ct-loader-brand {
        margin: 0;
        font-family: 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif;
        font-size: clamp(30px, 8vw, 46px);
        font-weight: 300;
        letter-spacing: 0.30em;
        text-transform: uppercase;
        color: #E5C76B;
        line-height: 1;
        padding-right: 0.30em;
        animation: ct-text-up 750ms cubic-bezier(0.22,1,0.36,1) 460ms both;
      }
      /* ── tagline ───────────────────────────────────────────── */
      .ct-loader-tagline {
        margin: 14px 0 0;
        font-family: 'Jost', 'DM Sans', -apple-system, sans-serif;
        font-size: 10px;
        font-weight: 400;
        font-style: italic;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: rgba(212,175,55,0.40);
        padding-right: 0.24em;
        animation: ct-text-up 650ms ease-out 860ms both;
      }
      /* ── bottom edge gold line ─────────────────────────────── */
      .ct-loader-edge {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg,
          transparent 0%,
          rgba(212,175,55,0.13) 48%,
          transparent 100%
        );
        transform-origin: left;
        animation: ct-line-grow 1400ms ease-out 1000ms both;
      }
      /* ── keyframes ─────────────────────────────────────────── */
      @keyframes ct-logo-in {
        from { opacity: 0; transform: scale(0.80); }
        to   { opacity: 1; transform: scale(1);    }
      }
      @keyframes ct-line-grow {
        from { transform: scaleX(0); opacity: 0; }
        to   { transform: scaleX(1); opacity: 1; }
      }
      @keyframes ct-text-up {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0);    }
      }
      @media (prefers-reduced-motion: reduce) {
        .ct-loader-logo,
        .ct-loader-line,
        .ct-loader-brand,
        .ct-loader-tagline,
        .ct-loader-edge { animation: none; }
      }
      /* Hero section: tall enough on every breakpoint to contain overlay content */
      #root { min-height: 100vh; display: flex; flex-direction: column; }
      .hero-critical {
        position: relative;
        width: 100%;
        background-color: #0F0A1F;
        min-height: 480px;
        overflow: hidden;
        contain: layout style;
      }
      .hero-critical > img {
        display: block;
        width: 100%;
        height: 480px;
        object-fit: cover;
        object-position: center;
      }
      @media (min-width: 640px)  { .hero-critical, .hero-critical > img { min-height: 520px; height: 520px; } }
      @media (min-width: 768px)  { .hero-critical, .hero-critical > img { min-height: 560px; height: 560px; } }
      @media (min-width: 1024px) { .hero-critical, .hero-critical > img { min-height: 620px; height: 620px; } }
      @media (min-width: 1280px) { .hero-critical, .hero-critical > img { min-height: 700px; height: 700px; } }
    </style>

    <!-- ─── Remove preloader once React fires first paint ─── -->
    <script>
      (function () {
        var startTime = Date.now();
        var MIN_MS = 1800; // minimum display time before hiding preloader
        function hidePreloader() {
          var elapsed = Date.now() - startTime;
          var remaining = MIN_MS - elapsed;
          if (remaining > 0) {
            setTimeout(hidePreloader, remaining);
            return;
          }
          var el = document.getElementById('ct-preloader');
          if (el) {
            el.classList.add('ct-hidden');
            setTimeout(function () { if (el && el.parentNode) el.parentNode.removeChild(el); }, 400);
          }
        }
        // React typically mounts on DOMContentLoaded. We use requestAnimationFrame
        // inside a load event so it fires right after the first React paint.
        window.addEventListener('load', function () {
          requestAnimationFrame(function () {
            requestAnimationFrame(hidePreloader);
          });
        });
        // Safety net – hide after 7s regardless
        setTimeout(hidePreloader, 7000);
      })();
    </script>
