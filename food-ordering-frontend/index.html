    <style>
            /* ═══════════════════════════════════════════════════════════
         GOLD RING INSCRIPTION LOADER — Crêpe Time Tunisia
         SVG stroke-dashoffset ring draws clockwise → staggered letters
         Awwwards-level cinematic — no card, no bar, pure craft.
         Ring circumference r=70: 2π×70 = 439.82
         ═══════════════════════════════════════════════════════════ */

      #ct-preloader {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center; flex-direction: column;
        background: #06040C; overflow: hidden;
        transition: opacity 0.55s cubic-bezier(0.4,0,0.2,1), visibility 0.55s ease;
      }
      #ct-preloader::before {
        content: ''; position: absolute;
        top: -20%; right: -14%; width: 65vmin; height: 65vmin; border-radius: 50%;
        background: radial-gradient(circle, rgba(76,29,149,0.22) 0%, transparent 65%);
        pointer-events: none;
      }
      #ct-preloader::after {
        content: ''; position: absolute;
        bottom: -16%; left: -10%; width: 55vmin; height: 55vmin; border-radius: 50%;
        background: radial-gradient(circle, rgba(212,175,55,0.09) 0%, transparent 65%);
        pointer-events: none;
      }
      #ct-preloader.ct-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
      .ct-ld-scene {
        position: relative; z-index: 1;
        display: flex; flex-direction: column; align-items: center; text-align: center;
      }
      .ct-ld-ring-wrap {
        position: relative; width: 160px; height: 160px;
        animation: ct-ld-pop 700ms cubic-bezier(0.34,1.56,0.64,1) 80ms both;
      }
      .ct-ld-ring-svg {
        position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible;
      }
      .ct-ld-ring-track { stroke: rgba(212,175,55,0.09); }
      .ct-ld-ring-stroke {
        stroke-dasharray: 439.82; stroke-dashoffset: 439.82;
        transform: rotate(-90deg); transform-origin: center; stroke-linecap: round;
        animation: ct-ring-draw 2.2s cubic-bezier(0.22,1,0.36,1) 280ms both;
      }
      .ct-ld-ring-dot { animation: ct-ld-pop 400ms ease-out 2200ms both; }
      .ct-ld-logo-circle {
        position: absolute; inset: 16px; border-radius: 50%;
        overflow: hidden;
        background: radial-gradient(circle at center, #1A0D30 0%, #06040C 100%);
        display: flex; align-items: center; justify-content: center;
        box-shadow:
          0 0 0 1px rgba(212,175,55,0.22),
          0 0 40px rgba(212,175,55,0.18),
          0 20px 52px rgba(0,0,0,0.65);
      }
      .ct-ld-logo-img { width: 100%; height: 100%; object-fit: cover; object-position: center; }
      .ct-ld-letters {
        display: flex; align-items: baseline; justify-content: center;
        margin-top: 26px;
        font-family: 'Cormorant Garamond', 'Georgia', serif;
        font-size: clamp(26px, 8vw, 42px);
        font-weight: 300; color: #E5C76B; letter-spacing: 0.24em;
        text-transform: uppercase; line-height: 1; padding-right: 0.24em;
      }
      .ct-ld-l {
        display: inline-block; opacity: 0;
        animation: ct-ld-letter 450ms cubic-bezier(0.22,1,0.36,1)
          calc(var(--i, 0) * 58ms + 1900ms) both;
      }
      .ct-ld-l--sp { width: 0.34em; }
      .ct-ld-tagline {
        margin: 13px 0 0;
        font-family: 'Jost', 'DM Sans', sans-serif;
        font-size: 10px; font-weight: 400; font-style: italic;
        letter-spacing: 0.26em; text-transform: uppercase;
        color: rgba(212,175,55,0.38); padding-right: 0.26em;
        animation: ct-ld-fadein 700ms ease-out 2700ms both;
      }
      .ct-ld-edge {
        position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
        background: linear-gradient(90deg, transparent 0%, rgba(212,175,55,0.14) 50%, transparent 100%);
        transform-origin: left; animation: ct-ld-grow 1.5s ease-out 1200ms both;
      }
      @keyframes ct-ring-draw { to { stroke-dashoffset: 0; } }
      @keyframes ct-ld-pop {
        from { opacity: 0; transform: scale(0.82); }
        to   { opacity: 1; transform: scale(1);    }
      }
      @keyframes ct-ld-letter {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes ct-ld-fadein { from { opacity: 0; } to { opacity: 1; } }
      @keyframes ct-ld-grow {
        from { transform: scaleX(0); opacity: 0; }
        to   { transform: scaleX(1); opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        .ct-ld-ring-wrap, .ct-ld-ring-stroke, .ct-ld-ring-dot,
        .ct-ld-l, .ct-ld-tagline, .ct-ld-edge { animation: none; opacity: 1; }
        .ct-ld-ring-stroke { stroke-dashoffset: 0; }
      }
      /* Hero section: tall enough on every breakpoint to contain overlay content */
      #root { min-height: 100vh; display: flex; flex-direction: column; }
      .hero-critical {

        height: 480px;
        object-fit: cover;
        object-position: center;
      }
      @media (min-width: 640px)  { .hero-critical, .hero-critical > img { min-height: 520px; height: 520px; } }
      @media (min-width: 768px)  { .hero-critical, .hero-critical > img { min-height: 560px; height: 560px; } }
      @media (min-width: 1024px) { .hero-critical, .hero-critical > img { min-height: 620px; height: 620px; } }
      @media (min-width: 1280px) { .hero-critical, .hero-critical > img { min-height: 700px; height: 700px; } }
    </style>

    <!-- ─── Remove preloader once React fires first paint ─── -->
    <script>
      (function () {
        var startTime = Date.now();
        var MIN_MS = 1800; // minimum display time before hiding preloader
        function hidePreloader() {
          var elapsed = Date.now() - startTime;
          var remaining = MIN_MS - elapsed;
          if (remaining > 0) {
            setTimeout(hidePreloader, remaining);
            return;
          }
          var el = document.getElementById('ct-preloader');
          if (el) {
            el.classList.add('ct-hidden');
            setTimeout(function () { if (el && el.parentNode) el.parentNode.removeChild(el); }, 400);
          }
        }
        // React typically mounts on DOMContentLoaded. We use requestAnimationFrame
        // inside a load event so it fires right after the first React paint.
        window.addEventListener('load', function () {
          requestAnimationFrame(function () {
            requestAnimationFrame(hidePreloader);
          });
        });
        // Safety net – hide after 7s regardless
        setTimeout(hidePreloader, 7000);
      })();
    </script>
