    <style>
      /* ── Preloader ─────────────────────────────────────────────────────────── */
      #ct-preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        padding: 24px;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 20%, rgba(124,58,237,0.26) 0%, transparent 32%),
          radial-gradient(circle at 82% 18%, rgba(212,175,55,0.18) 0%, transparent 26%),
          radial-gradient(circle at 50% 110%, rgba(65,18,110,0.44) 0%, transparent 40%),
          linear-gradient(180deg, #130A21 0%, #0C0818 55%, #07040D 100%);
        transition: opacity 0.35s ease, visibility 0.35s ease;
      }
      #ct-preloader::before,
      #ct-preloader::after {
        content: '';
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      #ct-preloader::before {
        background:
          linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 100px 100px;
        mask-image: radial-gradient(circle at center, black 28%, transparent 90%);
        opacity: 0.35;
      }
      #ct-preloader::after {
        background: radial-gradient(circle at center, transparent 42%, rgba(4,2,8,0.74) 100%);
      }
      #ct-preloader.ct-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .ct-preloader-card {
        position: relative;
        z-index: 1;
        width: min(100%, 380px);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        padding: 26px 22px 22px;
        border-radius: 30px;
        overflow: hidden;
        background: linear-gradient(180deg, rgba(24,16,43,0.9) 0%, rgba(11,8,21,0.94) 100%);
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow:
          0 30px 80px rgba(0,0,0,0.52),
          inset 0 1px 0 rgba(255,255,255,0.08);
        backdrop-filter: blur(16px);
        animation: ct-stage-enter 420ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .ct-preloader-card::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(140deg, rgba(255,255,255,0.2), rgba(212,175,55,0.08), rgba(124,58,237,0.14));
        -webkit-mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        mask-composite: exclude;
        pointer-events: none;
      }
      .ct-preloader-badge {
        position: relative;
        z-index: 1;
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.04);
        color: rgba(255,248,225,0.82);
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      .ct-preloader-visual {
        position: relative;
        width: min(100%, 220px);
        aspect-ratio: 1;
        display: grid;
        place-items: center;
      }
      .ct-preloader-glow {
        position: absolute;
        inset: 24px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(124,58,237,0.28) 0%, rgba(212,175,55,0.12) 45%, transparent 72%);
        filter: blur(18px);
        animation: ct-glow-pulse 3.8s ease-in-out infinite;
      }
      .ct-preloader-orbit {
        position: absolute;
        border-radius: 50%;
        border: 1px solid rgba(255,255,255,0.06);
      }
      .ct-preloader-orbit-outer {
        inset: 0;
        border-color: rgba(212,175,55,0.26);
        box-shadow: inset 0 0 0 1px rgba(212,175,55,0.06);
        animation: ct-orbit 7s linear infinite;
      }
      .ct-preloader-orbit-mid {
        inset: 20px;
        border-color: rgba(124,58,237,0.24);
        border-style: dashed;
        animation: ct-orbit-reverse 5.4s linear infinite;
      }
      .ct-preloader-orbit-inner {
        inset: 40px;
        border-color: rgba(255,255,255,0.12);
        animation: ct-orbit 3.6s linear infinite;
      }
      .ct-preloader-spark {
        position: absolute;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: radial-gradient(circle, #FFF8E1 0%, #D4AF37 60%, rgba(212,175,55,0) 100%);
        box-shadow: 0 0 18px rgba(212,175,55,0.55);
      }
      .ct-preloader-spark-one {
        top: 16px;
        left: calc(50% - 4px);
      }
      .ct-preloader-spark-two {
        left: 16px;
        bottom: 12px;
        width: 7px;
        height: 7px;
        background: radial-gradient(circle, #EDE9FE 0%, #8B5CF6 60%, rgba(139,92,246,0) 100%);
        box-shadow: 0 0 16px rgba(139,92,246,0.55);
      }
      .ct-preloader-dock {
        position: relative;
        width: 108px;
        height: 108px;
        padding: 2px;
        border-radius: 34px;
        overflow: hidden;
        box-shadow:
          0 18px 46px rgba(0,0,0,0.34),
          0 0 0 1px rgba(255,255,255,0.06);
      }
      .ct-preloader-dock::before {
        content: '';
        position: absolute;
        inset: -120%;
        background:
          conic-gradient(
            from 0deg,
            #D4AF37,
            transparent 20%,
            #7C3AED 40%,
            transparent 58%,
            #F5DEB0 80%,
            #D4AF37
          );
        animation: ct-orbit 4.4s linear infinite;
      }
      .ct-preloader-logo-shell {

        width: 100%;
        height: 100%;

      }
      .ct-preloader-logo {
        width: 80px;
        height: 80px;
        object-fit: contain;
        object-position: center;
        animation: ct-logo-float 2.8s ease-in-out infinite;
      }
      .ct-preloader-brand {
        margin: 0;
        font-family: 'Syne', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: clamp(28px, 5vw, 36px);
        font-weight: 800;
        letter-spacing: -0.05em;
        line-height: 0.95;
        background: linear-gradient(135deg, #FFFFFF 0%, #FFF5D6 55%, #E8C96A 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        color: transparent;
      }
      .ct-preloader-tagline {
        margin: -4px 0 0;
        color: rgba(212,175,55,0.92);
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }
      .ct-preloader-progress {
        position: relative;
        width: 100%;
        height: 9px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255,255,255,0.06);
      }
      .ct-preloader-progress::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      }
      .ct-preloader-progress > span {
        display: block;
        width: 44%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, rgba(124,58,237,0.4) 0%, #D4AF37 48%, rgba(255,255,255,0.92) 100%);
        box-shadow: 0 0 20px rgba(212,175,55,0.4);
        animation: ct-progress-slide 1.9s ease-in-out infinite;
      }
      .ct-preloader-ring,
      .ct-preloader-emoji,
      .ct-preloader-text {
        display: none !important;
      }
      @keyframes ct-stage-enter {
        from {
          opacity: 0;
          transform: translateY(18px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      @keyframes ct-glow-pulse {
        0%, 100% {
          opacity: 0.55;
          transform: scale(0.96);
        }
        50% {
          opacity: 1;
          transform: scale(1.04);
        }
      }
      @keyframes ct-orbit {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes ct-orbit-reverse {
        from { transform: rotate(360deg); }
        to { transform: rotate(0deg); }
      }
      @keyframes ct-logo-float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }
      @keyframes ct-progress-slide {
        0% { transform: translateX(-120%); }
        100% { transform: translateX(260%); }
      }
      @media (prefers-reduced-motion: reduce) {
        .ct-preloader-card,
        .ct-preloader-glow,
        .ct-preloader-orbit-outer,
        .ct-preloader-orbit-mid,
        .ct-preloader-orbit-inner,
        .ct-preloader-dock::before,
        .ct-preloader-logo,
        .ct-preloader-progress > span {
          animation: none;
        }
      }
      /* Hero section: tall enough on every breakpoint to contain overlay content */
      #root { min-height: 100vh; display: flex; flex-direction: column; }
      .hero-critical {
        position: relative;
        width: 100%;
        background-color: #0F0A1F;
        min-height: 480px;
        overflow: hidden;
        contain: layout style;
      }
      .hero-critical > img {

        height: 480px;

        object-position: center;
      }
      @media (min-width: 640px)  { .hero-critical, .hero-critical > img { min-height: 520px; height: 520px; } }
      @media (min-width: 768px)  { .hero-critical, .hero-critical > img { min-height: 560px; height: 560px; } }
      @media (min-width: 1024px) { .hero-critical, .hero-critical > img { min-height: 620px; height: 620px; } }
      @media (min-width: 1280px) { .hero-critical, .hero-critical > img { min-height: 700px; height: 700px; } }
    </style>

    <!-- ─── Remove preloader once React fires first paint ─── -->
    <script>
      (function () {
        var startTime = Date.now();
        var MIN_MS = 1800; // minimum display time before hiding preloader
        function hidePreloader() {
          var elapsed = Date.now() - startTime;
          var remaining = MIN_MS - elapsed;
          if (remaining > 0) {
            setTimeout(hidePreloader, remaining);
            return;
          }
          var el = document.getElementById('ct-preloader');
          if (el) {
            el.classList.add('ct-hidden');
            setTimeout(function () { if (el && el.parentNode) el.parentNode.removeChild(el); }, 400);
          }
        }
        // React typically mounts on DOMContentLoaded. We use requestAnimationFrame
        // inside a load event so it fires right after the first React paint.
        window.addEventListener('load', function () {
          requestAnimationFrame(function () {
            requestAnimationFrame(hidePreloader);
          });
        });
        // Safety net – hide after 7s regardless
        setTimeout(hidePreloader, 7000);
      })();
    </script>
