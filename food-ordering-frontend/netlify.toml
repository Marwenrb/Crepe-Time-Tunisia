# =============================================================================
# Crêpe Time Tunisia — Production Netlify Configuration
# Domain: crepetime.tn | Backend: crepe-time-tunisia.onrender.com
# =============================================================================

[build]
  command   = "npm run build"
  publish   = "dist"

# ─── SPA Client-Side Routing ─────────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ─── Security Headers (all pages) ───────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    X-XSS-Protection          = "1; mode=block"
    X-DNS-Prefetch-Control    = "on"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# ─── Cache: HTML — always revalidate ────────────────────────────────────────
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ─── Cache: Vite hashed assets (JS, CSS) — 1 year immutable ─────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Cache: Static images — 1 year ──────────────────────────────────────────
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.avif"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Cache: Fonts — 1 year ───────────────────────────────────────────────────
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Cache: Web manifest & SEO files — 1 day ────────────────────────────────
[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control  = "public, max-age=86400"
    Content-Type   = "application/xml; charset=utf-8"
