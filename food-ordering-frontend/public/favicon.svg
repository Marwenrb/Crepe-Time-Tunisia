<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B21B6"/>
      <stop offset="100%" stop-color="#3B0764"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#F5D16B"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5D16B"/>
      <stop offset="100%" stop-color="#C5972C"/>
    </linearGradient>
  </defs>
  <!-- Purple circle background -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Gold ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#ring)" stroke-width="10"/>
  <!-- Crêpe icon — stylized folded crêpe with dripping topping -->
  <g transform="translate(256,200)" fill="url(#gold)">
    <!-- Folded crêpe triangle -->
    <path d="M0-95 L80,45 L-80,45 Z" stroke="#B8860B" stroke-width="3" stroke-linejoin="round"/>
    <!-- Fold line -->
    <line x1="0" y1="-95" x2="0" y2="45" stroke="#B8860B" stroke-width="2.5" opacity="0.5"/>
    <!-- Topping drips -->
    <path d="M-35,-50 Q-40,-35 -30,-30 Q-20,-35 -25,-50" fill="#F5D16B"/>
    <path d="M10,-65 Q5,-48 15,-43 Q25,-48 20,-65" fill="#F5D16B"/>
    <path d="M-10,-75 Q-18,-55 -5,-50 Q8,-55 0,-75" fill="#F5D16B"/>
    <!-- Drip drops -->
    <ellipse cx="-30" cy="-22" rx="8" ry="5" fill="#F5D16B"/>
    <ellipse cx="15" cy="-35" rx="7" ry="4.5" fill="#F5D16B"/>
  </g>
  <!-- "CT" text -->
  <text x="256" y="360" text-anchor="middle" font-family="Georgia,serif" font-weight="bold" font-size="110" fill="url(#gold)" letter-spacing="8">CT</text>
  <!-- Tagline -->
  <text x="256" y="410" text-anchor="middle" font-family="Arial,sans-serif" font-weight="600" font-size="28" fill="#F5D16B" letter-spacing="6" opacity="0.85">THE SWEETEST ESCAPE</text>
</svg>
